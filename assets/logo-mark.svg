<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ThoughtML">
  <!-- The ThoughtML mark: the letter T as a reasoning graph (two nodes + an
       edge form the crossbar; an edge drops to a third, contested node).
       Ink is `currentColor`; the lone accent node is the brand azure. -->
  <g fill="none" stroke="currentColor" stroke-width="5.5" stroke-linecap="round">
    <line x1="15" y1="17" x2="49" y2="17" />
    <line x1="32" y1="17" x2="32" y2="51" />
  </g>
  <circle cx="15" cy="17" r="7.5" fill="currentColor" />
  <circle cx="49" cy="17" r="7.5" fill="currentColor" />
  <circle cx="32" cy="51" r="7.5" fill="#5cb0ff" />
</svg>
