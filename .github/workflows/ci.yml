name: CI

on:
  push:
  pull_request:

jobs:
  parser:
    name: Reference parser (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/thoughtml-parser-rs
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        run: cargo test --all-features
        # The suite includes the conformance guard: every bundled example must
        # parse strict-clean (zero errors AND zero warnings) under default options.

  web:
    name: Playground (wasm + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/thoughtml-web/package-lock.json
      - name: Install deps
        working-directory: tools/thoughtml-web
        run: npm ci
      - name: Build wasm
        working-directory: tools/thoughtml-web
        run: npm run wasm
      - name: Typecheck + build
        working-directory: tools/thoughtml-web
        run: npm run build
